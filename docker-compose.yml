# API (Dockerfile): ao arrancar corre `npx prisma migrate deploy --schema=$PRISMA_SCHEMA` contra o Postgres.
# Migrações em apps/api/prisma/migrations (ex.: multi-tenant, SUPER_ADMIN enum, platform/audit/flags).
# A imagem inclui o CLI `prisma` e `tsx` nas dependencies da API para o container não depender de devDependencies.
#
# Postgres: 16 no serviço `db`. Garantir que a API só inicia após db healthy.
#
# Subir: docker compose up -d --build
# Só API após novo código/migrações: docker compose build api --no-cache && docker compose up -d api
#
# PUBLIC_URL = URL público (igual ao site no Caddyfile). Webhook: {PUBLIC_URL}/webhooks/whatsapp/{orgId}
#
# Variáveis ${...} vêm do ficheiro `.env` na raiz (Compose interpola automaticamente).
# EasyPanel / PaaS: definir no painel JWT_SECRET (ex.: openssl rand -hex 32), PUBLIC_URL (domínio
# público, ex.: https://crm.teudominio.com), DB_PASSWORD. Sem JWT_SECRET o contentor da API
# arranca em crash loop e fica unhealthy.
#
# web usa depends_on api: service_started (não service_healthy): o compose do EasyPanel completa
# o deploy enquanto migrações/seed correm; até a API escutar na 3000 pode haver 502 em /api — normal.
#
# Primeiro deploy: RUN_DB_SEED=true (sem espaço antes do nome da variável). Depois repor false.
# Super admin no seed: SEED_SUPER_ADMIN=1 e SUPER_ADMIN_EMAIL / SUPER_ADMIN_PASSWORD
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: openconduit
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openconduit}
      POSTGRES_DB: openconduit
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openconduit"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: openconduit-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://openconduit:${DB_PASSWORD:-openconduit}@db:5432/openconduit
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in environment (e.g. openssl rand -hex 32)}
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      # Ouve IPv4+IPv6 no container (evita falhas com loopback IPv6-only).
      HOST: "::"
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost}
      NODE_ENV: production
      # true apenas no primeiro arranque (ou ambientes controlados); depois definir false
      RUN_DB_SEED: ${RUN_DB_SEED:-false}
      SEED_SUPER_ADMIN: ${SEED_SUPER_ADMIN:-0}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-super@openconduit.dev}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-super123}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r&&r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 600s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      PUBLIC_URL: ${PUBLIC_URL:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - web

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
