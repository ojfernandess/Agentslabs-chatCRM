server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS interno do Docker. Sem isto, proxy_pass http://api:3000 resolve "api" no arranque do
    # nginx e falha com "host not found in upstream" se o serviço ainda não estiver no DNS.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API proxy ($api_host: resolução por pedido, não no reload do nginx)
    location /api/ {
        set $api_host api;
        proxy_pass http://$api_host:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook proxy
    location /webhooks/ {
        set $api_host api;
        proxy_pass http://$api_host:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Marca / login: cache curto (o build também acrescenta ?v= aos URLs da app)
    location = /logo.svg {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    location = /favicon.png {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    location = /bg-login.png {
        expires 4h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
