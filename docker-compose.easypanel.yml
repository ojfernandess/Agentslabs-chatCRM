# Optional: use as the LAST compose file in the deploy command so these port mappings win over
# a panel-generated override that pins "80:80" (e.g. EasyPanel). Example:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml -f docker-compose.easypanel.yml up -d
# Variables are optional; defaults match the main compose (8080 / 8443 on the host).
services:
  caddy:
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
